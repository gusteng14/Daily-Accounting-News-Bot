name: Daily Accounting News Bot

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC (8:00 AM PST) every day
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push posted_urls.json back to repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Python script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python main.py
        
      - name: Commit posted URLs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_urls.json
          git commit -m "chore: update posted URLs" || echo "No changes to commit"
          git push
